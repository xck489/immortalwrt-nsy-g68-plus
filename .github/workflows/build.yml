name: Build

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 5'
  workflow_dispatch:

env:
  REPO_URL: https://github.com/zhoufuli/immortalwrt-rk356x
  REPO_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-hours: 8
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Maximize disk space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 2048
          root-reserve-mb: 2048
          
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4
          
      - name: Clone
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          
      - name: Build
        run: |
          cd openwrt
          cp ../configs/g68_mtk_wifi.config .config
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make download -j8
          make -j$(nproc) world
          
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7
