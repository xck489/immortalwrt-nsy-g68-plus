name: Build ImmortalWrt

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 5'
  workflow_dispatch:

env:
  REPO_URL: https://github.com/zhoufuli/immortalwrt-rk356x
  REPO_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Clean disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gperf texinfo libncurses-dev python3 libncurses5-dev python3-dev libssl-dev gettext zlib1g-dev file wget git curl unzip gawk diffutils xz-utils bc automake cmake device-tree-compiler ccache libtool autoconf autogen m4 python3-pip
          
      - name: Build
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          cp ../configs/g68_mtk_wifi.config .config
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig 2>&1 | tee /tmp/defconfig.log
          head -50 /tmp/defconfig.log
          
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7
          
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: /tmp/defconfig.log
          retention-days: 7
