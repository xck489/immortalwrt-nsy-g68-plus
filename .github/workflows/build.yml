name: Build

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: openwrt

      - name: Install deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4 python3-pyelftools

      - name: Build
        run: |
          REPO_ROOT=$PWD
          echo "Repo root: $REPO_ROOT"

          # 进入源码目录（仓库2本身就是源码）
          cd $REPO_ROOT/openwrt

          # 更新并安装 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 复制配置并生成完整配置
          cp $REPO_ROOT/openwrt/configs/nsy_g68-plus.config .config
          echo "=== 使用的配置文件 ==="
          echo "源配置: $REPO_ROOT/openwrt/configs/nsy_g68-plus.config"
          ls -la $REPO_ROOT/openwrt/configs/
          echo "SHA256: $(sha256sum $REPO_ROOT/openwrt/configs/nsy_g68-plus.config | cut -c1-64)"
          make defconfig
          make oldconfig MAKEFLAGS=-y

          # 强制禁用 rust host 包（避免编译失败）
          echo "=== 禁用 rust host 包 ==="
          sed -i "/# CONFIG_PACKAGE_rust is not set/d" .config
          sed -i "/CONFIG_RUST_SCCACHE/d" .config
          echo "# CONFIG_PACKAGE_rust is not set" >> .config

          # 强制写入 LuCI 配置
          echo "=== 强制写入 LuCI 配置 ==="
          sed -i "/CONFIG_PACKAGE_luci=/d" .config
          echo "CONFIG_PACKAGE_luci=y" >> .config

          # 强制写入 istore 配置
          echo "=== 强制写入 istore 配置 ==="
          sed -i "/CONFIG_PACKAGE_luci-app-store=/d" .config
          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config

          echo "=== 验证设备配置 ==="
          grep "CONFIG_TARGET_rockchip_armv8_DEVICE_nsy_g68-plus=y" .config && echo "✅ 设备配置正确" || echo "❌ 设备配置缺失"
          grep -F "CONFIG_PACKAGE_luci-app-store=y" .config && echo "✅ istore 已配置" || echo "⚠️ istore 未配置"
          grep -F "CONFIG_PACKAGE_luci=y" .config && echo "✅ LuCI 已配置" || echo "⚠️ LuCI 未配置"

          make download -j8
          make -j1 world

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
