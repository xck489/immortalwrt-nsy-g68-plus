name: nsy-g68-plus-build

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: immortalwrt
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4 python3-pip python3-pyelftools

      - name: Prepare config and feeds
        run: |
          cd immortalwrt
          cp .feeds.conf feeds.conf.default
          cp .config .config.backup
          chmod +x scripts/*.sh

      - name: Update and install feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download
        run: |
          cd immortalwrt
          make download -j8

      - name: Build
        run: |
          cd immortalwrt
          make -j$(nproc) world

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware
          path: immortalwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7
