name: Build ImmortalWrt

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 5'  # 每周五凌晨2点自动编译
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-hours: 8
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gperf texinfo             libncurses-dev python3 libncurses5-dev python3-dev python3-setuptools             libssl-dev gettext zlib1g-dev file wget git curl unzip gettext             pkg-config gawk diffutils xz-utils bc bison automake cmake             device-tree-compiler ccache libtool autoconf autogen m4 stdenv python3-pip
          
      - name: Setup ccache
        uses: actions/cache@v3
        with:
          path: ~/.ccache
          key: build-ccache-${{ runner.os }}
          
      - name: Clone ImmortalWrt
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git --depth 1 --branch openwrt-24.10
          
      - name: Copy config
        run: |
          cp .config immortalwrt/.config
          cp .feeds.conf immortalwrt/.feeds.conf
          
      - name: Setup feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: Update feeds for istore
        run: |
          cd immortalwrt
          rm -f .feeds.conf
          cat > .feeds.conf << 'FEEDS'
src-git base https://github.com/immortalwrt/immortalwrt.git;openwrt-24.10
src-git luci https://github.com/immortalwrt/luci.git;openwrt-24.10
src-git routing https://github.com/openwrt/routing.git;openwrt-24.10
src-git telephony https://github.com/openwrt/telephony.git;openwrt-24.10
src-git packages https://github.com/immortalwrt/packages.git;openwrt-24.10
src-git istore https://github.com/linkease/istore;main
src-git netwizard https://github.com/sirpdboy/luci-app-netwizard;main
FEEDS
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: Build
        run: |
          cd immortalwrt
          make defconfig
          make -j$(nproc) world
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: immortalwrt/bin/targets/rockchip/armv8/*.img.gz
          
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            immortalwrt/build*.log
            immortalwrt/.config
