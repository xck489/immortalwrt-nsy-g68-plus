name: nsy-g68-plus-build

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 5'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 600

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: immortalwrt
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libncurses-dev zlib1g-dev libssl-dev wget git curl unzip gettext pkg-config python3 python3-pip python3-pyelftools gawk diffutils xz-utils file bc bison flex automake cmake help2man ocaml sparse ccache rsync time device-tree-compiler

      - name: Copy config
        run: |
          cd immortalwrt
          cp .config .config.backup
          chmod +x scripts/*.sh

      - name: Update and install feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build firmware
        run: |
          cd immortalwrt
          make -j$(nproc) world V=s 2>&1 | tee build.log

      - name: Check build result
        run: |
          cd immortalwrt
          if [ -d "bin/targets/rockchip/armv8" ]; then
            echo "Build successful!"
            ls -lh bin/targets/rockchip/armv8/*.img.gz 2>/dev/null || echo "No gz images"
          else
            echo "Build failed"
            tail -100 build.log
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: immortalwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7
